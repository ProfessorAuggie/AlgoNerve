<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    .node { fill: #a78bfa; }
    .edge { stroke: #6d28d9; stroke-width: 1.5; stroke-linecap: round; }
    .glow { fill: #a78bfa; filter: drop-shadow(0 0 4px #8b5cf6); }
  </style>
  <!-- Connection paths representing neural dendrites -->
  <line x1="6" y1="16" x2="16" y2="10" class="edge" />
  <line x1="6" y1="16" x2="14" y2="22" class="edge" />
  <line x1="16" y1="10" x2="26" y2="12" class="edge" />
  <line x1="14" y1="22" x2="24" y2="24" class="edge" />
  <line x1="26" y1="12" x2="24" y2="24" class="edge" />
  <line x1="24" y1="24" x2="28" y2="18" class="edge" />
  
  <!-- Glowing central nerve/synapse node -->
  <circle cx="16" cy="10" r="3" class="glow" />
  <circle cx="24" cy="24" r="3.5" class="glow" />
  
  <!-- Outer axon nodes -->
  <circle cx="6" cy="16" r="2.5" class="node" />
  <circle cx="14" cy="22" r="2" class="node" />
  <circle cx="26" cy="12" r="2" class="node" />
  <circle cx="28" cy="18" r="2.5" class="node" />
</svg>